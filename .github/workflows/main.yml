name: KoFIU Sanctions Monitor

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore last seen state
        uses: actions/cache@v4
        with:
          path: last_seen.json
          key: kofiu-last-seen-${{ runner.os }}
          restore-keys: |
            kofiu-last-seen-

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kofiu_bot.py

      - name: Save last seen state
        uses: actions/cache/save@v4
        with:
          path: last_seen.json
          key: kofiu-last-seen-${{ runner.os }}-${{ github.run_id }}
