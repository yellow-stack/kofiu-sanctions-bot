name: KoFIU & UN & NaverPay Sanctions Monitor

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore KoFIU last seen state
        uses: actions/cache@v4
        with:
          path: last_seen.json
          key: kofiu-last-seen-${{ runner.os }}
          restore-keys: |
            kofiu-last-seen-

      - name: Restore UN last seen state
        uses: actions/cache@v4
        with:
          path: un_last_seen.json
          key: un-last-seen-${{ runner.os }}
          restore-keys: |
            un-last-seen-

      - name: Run KoFIU bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kofiu_bot.py

      - name: Run UN sanctions bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python un_sanctions_bot.py

      - name: Run NaverPay story bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python naverpay_story_bot.py

      - name: Save KoFIU last seen state
        uses: actions/cache/save@v4
        with:
          path: last_seen.json
          key: kofiu-last-seen-${{ runner.os }}-${{ github.run_id }}

      - name: Save UN last seen state
        uses: actions/cache/save@v4
        with:
          path: un_last_seen.json
          key: un-last-seen-${{ runner.os }}-${{ github.run_id }}
